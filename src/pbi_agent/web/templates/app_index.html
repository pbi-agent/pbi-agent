<!DOCTYPE html>
<html>
  <head>
    <title>PBI Agent</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <link rel="stylesheet" href="{{ config.static.url }}css/xterm.css" />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Roboto%20Mono"
    />
    <script src="{{ config.static.url }}js/textual.js"></script>
    <style>
      body {
        background: #0c181f;
      }

      .dialog-container {
        position: absolute;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
        box-shadow: var(--shadow-elevation-high);
      }
      .shade {
        position: absolute;
        width: 100%;
        height: 100%;
        background: #0c181f;
        background-image: url("{{ config.static.url }}images/background.png");
      }
      .intro {
        width: 640px;
        height: 240px;
        font-size: 16px;
        z-index: 20;
        font-family: "Roboto Mono", menlo, monospace;
        text-align: center;
        opacity: 1;
        color: rgba(255, 255, 255, 0.95);
        background-color: #12232d;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 32px;
      }

      body.-first-byte .intro-dialog,
      body.-first-byte .intro-dialog .shade {
        opacity: 0;
        transition: opacity 0.3s ease-out;
        display: none;
      }

      body .textual-terminal {
        opacity: 0;
        transition: opacity 0.3s ease-out;
      }

      body.-first-byte .textual-terminal {
        opacity: 1;
        transition: opacity 0.3s ease-out;
      }

      .intro svg {
        padding-right: 16px;
      }

      body Button {
        padding: 16px 32px;
        background-color: #5e0ba7;
        color: rgba(255, 255, 255, 0.95);
        border: none;
        font-family: "Roboto Mono", menlo, monospace;
        margin: 16px;
        display: block;
      }

      Button:hover {
        background: #ac5af4;
        cursor: pointer;
      }

      .closed-dialog {
        opacity: 0;
        display: none;
      }

      body.-closed .closed-dialog {
        opacity: 1;
        display: flex;
      }

      #start {
        display: none;
      }

      #start.-delay {
        display: flex;
      }
    </style>
    <script>
      function getStartUrl() {
        const url = new URL(window.location.href);
        const params = new URLSearchParams(url.search);
        params.delete("delay");
        return url.pathname + "?" + params.toString();
      }
      async function refresh() {
        const ping_url = document.body.dataset.pingurl;
        if (ping_url) {
          await fetch(ping_url, {
            method: "GET",
            mode: "no-cors",
          });
        }
        window.location.href = getStartUrl();
      }

      function installTerminalInputBridges() {
        const NATIVE_WEBSOCKET = window.WebSocket;
        const MODIFIER_ENTER_SEQUENCES = new Map([
          ["shift", "\u001b[13;2u"],
          ["alt", "\u001b[13;3u"],
          ["alt+shift", "\u001b[13;4u"],
          ["ctrl", "\u001b[13;5u"],
          ["ctrl+shift", "\u001b[13;6u"],
          ["alt+ctrl", "\u001b[13;7u"],
          ["alt+ctrl+shift", "\u001b[13;8u"],
        ]);
        let appSocket = null;

        function websocketTargetsApp(url) {
          if (typeof url !== "string") {
            return false;
          }
          return url.includes("/ws");
        }

        function WrappedWebSocket(...args) {
          const socket = new NATIVE_WEBSOCKET(...args);
          if (websocketTargetsApp(args[0])) {
            appSocket = socket;
          }
          return socket;
        }

        WrappedWebSocket.prototype = NATIVE_WEBSOCKET.prototype;
        Object.setPrototypeOf(WrappedWebSocket, NATIVE_WEBSOCKET);
        for (const name of ["CONNECTING", "OPEN", "CLOSING", "CLOSED"]) {
          WrappedWebSocket[name] = NATIVE_WEBSOCKET[name];
        }
        window.WebSocket = WrappedWebSocket;

        function getModifierKey(event) {
          const modifiers = [];
          if (event.altKey) {
            modifiers.push("alt");
          }
          if (event.ctrlKey) {
            modifiers.push("ctrl");
          }
          if (event.shiftKey) {
            modifiers.push("shift");
          }
          return modifiers.join("+");
        }

        function terminalOwnsFocus() {
          const active = document.activeElement;
          if (!(active instanceof Element)) {
            return false;
          }
          return (
            active.classList.contains("xterm-helper-textarea") ||
            active.closest(".textual-terminal") !== null
          );
        }

        function appSocketReady() {
          return (
            appSocket !== null &&
            appSocket.readyState === NATIVE_WEBSOCKET.OPEN
          );
        }

        function sendTerminalInput(text) {
          if (!text || !appSocketReady()) {
            return false;
          }
          appSocket.send(JSON.stringify(["stdin", text]));
          return true;
        }

        function sendTerminalPaste(text) {
          if (!text || !appSocketReady()) {
            return false;
          }
          appSocket.send(JSON.stringify(["paste", text]));
          return true;
        }

        async function pasteClipboardText() {
          if (
            !terminalOwnsFocus() ||
            !appSocketReady() ||
            !navigator.clipboard ||
            typeof navigator.clipboard.readText !== "function"
          ) {
            return false;
          }
          try {
            const text = await navigator.clipboard.readText();
            return sendTerminalPaste(text);
          } catch (_error) {
            return false;
          }
        }

        document.addEventListener(
          "keydown",
          (event) => {
            if (
              event.key === "v" ||
              event.key === "V"
            ) {
              if (
                !event.altKey &&
                (event.ctrlKey || event.metaKey) &&
                !event.shiftKey &&
                terminalOwnsFocus()
              ) {
                event.preventDefault();
                event.stopPropagation();
                if (typeof event.stopImmediatePropagation === "function") {
                  event.stopImmediatePropagation();
                }
                void pasteClipboardText();
              }
              return;
            }

            if (event.key !== "Enter" || event.metaKey) {
              return;
            }
            const modifierKey = getModifierKey(event);
            if (!modifierKey) {
              return;
            }
            const sequence = MODIFIER_ENTER_SEQUENCES.get(modifierKey);
            if (!sequence || !terminalOwnsFocus()) {
              return;
            }
            if (!appSocketReady()) {
              return;
            }
            event.preventDefault();
            event.stopPropagation();
            if (typeof event.stopImmediatePropagation === "function") {
              event.stopImmediatePropagation();
            }
            sendTerminalInput(sequence);
          },
          true
        );

        document.addEventListener(
          "paste",
          (event) => {
            if (!terminalOwnsFocus()) {
              return;
            }
            const text = event.clipboardData?.getData("text/plain") ?? "";
            if (!text || !appSocketReady()) {
              return;
            }
            event.preventDefault();
            event.stopPropagation();
            if (typeof event.stopImmediatePropagation === "function") {
              event.stopImmediatePropagation();
            }
            sendTerminalPaste(text);
          },
          true
        );
      }

      installTerminalInputBridges();
    </script>
  </head>
  <body data-pingurl="{{ ping_url }}">
    <div class="dialog-container intro-dialog">
      <div class="shade"></div>
      <div class="intro">
        <svg
          width="32px"
          viewBox="0 0 2933 2261"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            fill-rule="evenodd"
            clip-rule="evenodd"
            d="M2927.81 0H1677.1L1312.35 205.173H306.689L0.359375 434.921L204.029 893.177H735.972L644.784 2261H1060.36L1441.72 1974.97L2073.92 688.003H2334.4L2717.9 472.286L2927.81 0ZM1245.82 410.347L1276.32 277.656H330.85L153.929 410.347H1245.82ZM1229.16 482.83H100.972L251.134 820.694H813.449L722.26 2188.52H837.043L1229.16 482.83ZM1350.7 277.656L911.417 2188.52H1023.87L1662.19 615.52H2301.36L2451.52 277.656H1350.7ZM1460.19 205.173H2497.79L2733.69 72.4829H1696.09L1460.19 205.173Z"
            fill="#ffffff"
          />
        </svg>

        <div>{{ application.name or 'Textual Application' }}</div>
        <button type="button" onClick="refresh()" id="start">Start</button>
      </div>
    </div>

    <div class="dialog-container closed-dialog">
      <div class="shade"></div>
      <div class="intro">
        <div class="message">Session ended.</div>
        <button type="button" onClick="refresh()">Restart</button>
      </div>
    </div>

    <div
      id="terminal"
      class="textual-terminal"
      data-session-websocket-url="{{ app_websocket_url }}"
      data-font-size="{{ font_size }}"
    ></div>
  </body>
</html>
