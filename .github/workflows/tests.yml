name: Tests

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          uv sync --group dev
          bun install --frozen-lockfile

      - name: Run tests
        run: uv run pytest

      - name: Run Ruff
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Run web tests
        run: bun run test:web

      - name: Run web lint
        run: bun run lint

      - name: Run web typecheck
        run: bun run typecheck

      - name: Verify generated API types
        run: |
          bun run web:api-types
          git diff --exit-code -- webapp/src/api-types.generated.ts

      - name: Verify web static assets
        run: |
          bun run web:build
          git diff --exit-code -- src/pbi_agent/web/static/app

      - name: Build docs
        run: bun run docs:build
