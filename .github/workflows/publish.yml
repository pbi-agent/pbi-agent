name: Publish

on:
  workflow_run:
    workflows:
      - Release
    types:
      - completed

permissions:
  contents: read

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify release tag matches package version
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          version = data["project"]["version"]
          expected_tag = f"v{version}"

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as fh:
              fh.write(f"EXPECTED_TAG={expected_tag}\n")
          PY
          release_target="$(gh release view "$EXPECTED_TAG" --json targetCommitish --jq .targetCommitish)"
          if [ "$release_target" != "$HEAD_SHA" ]; then
            echo "Release $EXPECTED_TAG targets $release_target, expected $HEAD_SHA." >&2
            exit 1
          fi

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Verify web static assets
        run: |
          bun run web:build
          git diff --exit-code -- src/pbi_agent/web/static/app

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
