name: Release

on:
  push:
    branches:
      - master
    paths:
      - pyproject.toml

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          uv sync --group dev
          bun install --frozen-lockfile

      - name: Run tests
        run: uv run pytest

      - name: Run Ruff
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Run web tests
        run: bun run test:web

      - name: Run web lint
        run: bun run lint

      - name: Run web typecheck
        run: bun run typecheck

      - name: Verify generated API types
        run: |
          bun run web:api-types
          git diff --exit-code -- webapp/src/api-types.generated.ts

      - name: Verify web static assets
        run: |
          bun run web:build
          git diff --exit-code -- src/pbi_agent/web/static/app

      - name: Build docs
        run: bun run docs:build

      - name: Read package version
        id: version
        run: |
          python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          version = data["project"]["version"]

          with open(Path(__import__("os").environ["GITHUB_OUTPUT"]), "a", encoding="utf-8") as fh:
              fh.write(f"version={version}\n")
              fh.write(f"tag=v{version}\n")
          PY

      - name: Create GitHub release if version is new
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          release_target="$(gh release view "$TAG" --json targetCommitish --jq .targetCommitish 2>/dev/null || true)"
          if [ -n "$release_target" ]; then
            echo "Release $TAG already exists."
            if [ "$release_target" != "$GITHUB_SHA" ]; then
              echo "Release $TAG targets $release_target, expected $GITHUB_SHA." >&2
              exit 1
            fi
            exit 0
          fi

          NOTES_FILE="docs/changelog/v$VERSION.md"
          if [ ! -f "$NOTES_FILE" ]; then
            echo "Missing changelog notes: $NOTES_FILE" >&2
            exit 1
          fi

          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --latest \
            --notes-file "$NOTES_FILE"
