name: Release

on:
  push:
    branches:
      - master
    paths:
      - pyproject.toml

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Read package version
        id: version
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path
          from subprocess import CalledProcessError, check_output

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          project_name = data["project"]["name"]
          version = data["project"]["version"]
          previous_version = None
          before_sha = os.environ.get("BEFORE_SHA")
          if before_sha and before_sha != "0" * 40:
              try:
                  previous_pyproject = check_output(
                      ["git", "show", f"{before_sha}:pyproject.toml"],
                      text=True,
                  )
              except CalledProcessError:
                  previous_pyproject = ""
              if previous_pyproject:
                  previous_version = tomllib.loads(previous_pyproject)["project"]["version"]
          should_release = previous_version != version

          with open(Path(os.environ["GITHUB_OUTPUT"]), "a", encoding="utf-8") as fh:
              fh.write(f"project_name={project_name}\n")
              fh.write(f"version={version}\n")
              fh.write(f"tag=v{version}\n")
              fh.write(f"should_release={str(should_release).lower()}\n")
          PY

      - name: Skip unchanged package version
        if: ${{ steps.version.outputs.should_release != 'true' }}
        run: echo "Package version did not change; skipping release."

      - name: Check release notes
        if: ${{ steps.version.outputs.should_release == 'true' }}
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          NOTES_FILE="docs/changelog/v$VERSION.md"
          if [ ! -f "$NOTES_FILE" ]; then
            echo "Missing changelog notes: $NOTES_FILE" >&2
            exit 1
          fi

      - name: Install dependencies
        if: ${{ steps.version.outputs.should_release == 'true' }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          uv sync --group dev
          bun install --frozen-lockfile

      - name: Run tests
        if: ${{ steps.version.outputs.should_release == 'true' }}
        run: uv run pytest

      - name: Run Ruff
        if: ${{ steps.version.outputs.should_release == 'true' }}
        run: uv run ruff check .

      - name: Check formatting
        if: ${{ steps.version.outputs.should_release == 'true' }}
        run: uv run ruff format --check .

      - name: Run web tests
        if: ${{ steps.version.outputs.should_release == 'true' }}
        run: bun run test:web

      - name: Run web lint
        if: ${{ steps.version.outputs.should_release == 'true' }}
        run: bun run lint

      - name: Run web typecheck
        if: ${{ steps.version.outputs.should_release == 'true' }}
        run: bun run typecheck

      - name: Verify generated API types
        if: ${{ steps.version.outputs.should_release == 'true' }}
        run: |
          bun run web:api-types
          git diff --exit-code -- webapp/src/api-types.generated.ts

      - name: Verify web static assets
        if: ${{ steps.version.outputs.should_release == 'true' }}
        run: |
          bun run web:build
          git diff --exit-code -- src/pbi_agent/web/static/app

      - name: Build docs
        if: ${{ steps.version.outputs.should_release == 'true' }}
        run: bun run docs:build

      - name: Install build dependencies
        if: ${{ steps.version.outputs.should_release == 'true' }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build distributions
        if: ${{ steps.version.outputs.should_release == 'true' }}
        run: python -m build

      - name: Verify current master before release draft
        if: ${{ steps.version.outputs.should_release == 'true' }}
        run: |
          git fetch origin master
          current_master="$(git rev-parse origin/master)"
          if [ "$current_master" != "$GITHUB_SHA" ]; then
            echo "Refusing to release $GITHUB_SHA because origin/master is $current_master." >&2
            exit 1
          fi

      - name: Prepare draft GitHub release
        id: draft_release
        if: ${{ steps.version.outputs.should_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PROJECT_NAME: ${{ steps.version.outputs.project_name }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          NOTES_FILE="docs/changelog/v$VERSION.md"

          release_target="$(gh release view "$TAG" --json targetCommitish --jq .targetCommitish 2>/dev/null || true)"
          release_is_draft="$(gh release view "$TAG" --json isDraft --jq .isDraft 2>/dev/null || true)"
          if [ -n "$release_target" ] && [ "$release_target" != "$GITHUB_SHA" ]; then
            echo "Release $TAG already exists and targets $release_target, not $GITHUB_SHA." >&2
            exit 1
          fi

          tag_ref="$(git ls-remote --tags origin "refs/tags/$TAG")"
          if [ -n "$tag_ref" ] && [ -z "$release_target" ]; then
            echo "Tag $TAG already exists without a matching GitHub release." >&2
            exit 1
          fi

          pypi_status="$(python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request

          project_name = os.environ["PROJECT_NAME"]
          version = os.environ["VERSION"]
          url = "https://pypi.org/pypi/{}/{}/json".format(
              urllib.parse.quote(project_name, safe=""),
              urllib.parse.quote(version, safe=""),
          )

          request = urllib.request.Request(url, method="GET")
          try:
              with urllib.request.urlopen(request, timeout=20) as response:
                  data = json.load(response)
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise
              print("missing")
          else:
              filenames = [item.get("filename", "") for item in data.get("urls", [])]
              has_wheel = any(filename.endswith(".whl") for filename in filenames)
              has_sdist = any(filename.endswith(".tar.gz") for filename in filenames)
              if has_wheel and has_sdist:
                  print("complete")
              else:
                  print("partial")
          PY
          )"

          if [ "$pypi_status" = "partial" ]; then
            echo "PyPI version $VERSION for $PROJECT_NAME has incomplete artifacts; expected at least one .whl and one .tar.gz." >&2
            exit 1
          fi

          if [ "$release_is_draft" = "false" ]; then
            if [ "$pypi_status" = "complete" ]; then
              echo "Release $TAG is already published for $GITHUB_SHA and PyPI has $VERSION."
              echo "upload_pypi=false" >> "$GITHUB_OUTPUT"
              echo "publish_release=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Release $TAG is already published, but PyPI version $VERSION is missing." >&2
            exit 1
          fi

          if [ "$pypi_status" = "complete" ] && [ "$release_is_draft" != "true" ]; then
            echo "PyPI version $VERSION already exists for $PROJECT_NAME without a matching draft release." >&2
            exit 1
          fi

          if [ "$release_is_draft" = "true" ]; then
            echo "Reusing draft release $TAG for $GITHUB_SHA."
          else
            gh release create "$TAG" \
              --target "$GITHUB_SHA" \
              --title "$TAG" \
              --draft \
              --notes-file "$NOTES_FILE"
          fi

          if [ "$pypi_status" = "complete" ]; then
            echo "PyPI version $VERSION already exists; publishing existing draft release."
            echo "upload_pypi=false" >> "$GITHUB_OUTPUT"
          else
            echo "upload_pypi=true" >> "$GITHUB_OUTPUT"
          fi
          echo "publish_release=true" >> "$GITHUB_OUTPUT"

      - name: Verify current master before PyPI upload
        if: ${{ steps.version.outputs.should_release == 'true' && steps.draft_release.outputs.upload_pypi == 'true' }}
        run: |
          git fetch origin master
          current_master="$(git rev-parse origin/master)"
          if [ "$current_master" != "$GITHUB_SHA" ]; then
            echo "Refusing to release $GITHUB_SHA because origin/master is $current_master." >&2
            exit 1
          fi

      - name: Publish to PyPI
        if: ${{ steps.version.outputs.should_release == 'true' && steps.draft_release.outputs.upload_pypi == 'true' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

      - name: Verify current master before GitHub release publish
        if: ${{ steps.version.outputs.should_release == 'true' && steps.draft_release.outputs.publish_release == 'true' }}
        run: |
          git fetch origin master
          current_master="$(git rev-parse origin/master)"
          if [ "$current_master" != "$GITHUB_SHA" ]; then
            echo "Refusing to release $GITHUB_SHA because origin/master is $current_master." >&2
            exit 1
          fi

      - name: Publish GitHub release
        if: ${{ steps.version.outputs.should_release == 'true' && steps.draft_release.outputs.publish_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release edit "$TAG" --draft=false --latest
