[project]
name = "oai-ws"
version = "0.2.1"
description = "WebSocket-based Power BI editing agent CLI foundation"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "prompt-toolkit>=3.0",
    "python-dotenv>=1.2.1",
    "textual>=0.70.0",
    "websocket-client>=1.9.0",
]

[project.scripts]
pbi-agent = "pbi_agent.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pbi_agent"]

# Include all non-Python template files bundled under pbi_agent/report/.
[tool.hatch.build.targets.wheel.force-include]
"src/pbi_agent/report" = "pbi_agent/report"
"src/pbi_agent/agent/AUDIT-TODO.md" = "pbi_agent/agent/AUDIT-TODO.md"
